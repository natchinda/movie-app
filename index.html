<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMovieList</title>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>
<body>

<header>
    <h1>MyMovieList</h1>
    <p>Descobre e guarda os teus filmes favoritos</p>
    <div class="nav-buttons">
        <button onclick="mostrarHome()">Início</button>
        <button onclick="mostrarFavoritos()">Minha Lista Favorita</button>
    </div>
</header>
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Pesquisar filmes...">
        <button id="searchBtn">Pesquisar</button>
        
        <div class="genres">
            <button onclick="buscarPorGenero(28)">Ação</button>
            <button onclick="buscarPorGenero(35)">Comédia</button>
            <button onclick="buscarPorGenero(27)">Terror</button>
        </div>
     </section>

    <main>
        <div id="loader">Carregar flmes...</div>
        <h2 id="sectionTitle">Filmes Populares</h2>
        <div id="moviesContainer"></div>
    </main>    
</body>
</html>
